<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Store & User Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Панель управления магазином</h1>

        <section class="card">
            <h2>Профиль пользователя</h2>
            <div class="user-info" id="user-display"></div>
            <div class="form-group mt">
                <input type="text" id="newName" placeholder="Изменить имя">
                <button id="updateUserBtn">Обновить имя</button>
            </div>
        </section>

        <section class="card">
            <h2>Добавить товар</h2>
            <div class="form-group">
                <input type="text" id="pName" placeholder="Название товара">
                <input type="number" id="pPrice" placeholder="Цена">
                <input type="number" id="pQty" placeholder="Кол-во">
                <button id="addProdBtn">Добавить</button>
            </div>
        </section>

        <section class="card">
            <h2>Склад товаров</h2>
            <table class="store-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Название</th>
                        <th>Цена</th>
                        <th>Кол-во</th>
                        <th>Действие</th>
                    </tr>
                </thead>
                <tbody id="product-list"></tbody>
            </table>
        </section>
    </div>

    <script>
        var UserRole;
        (function (UserRole) {
            UserRole[UserRole["Admin"] = 0] = "Admin";
            UserRole[UserRole["User"] = 1] = "User";
            UserRole[UserRole["Guest"] = 2] = "Guest";
        })(UserRole || (UserRole = {}));

        var ProductStore = (function () {
            function ProductStore() { this.products = []; }
            ProductStore.prototype.addProduct = function (product) {
                this.products.push(product);
            };
            ProductStore.prototype.updateProductQuantity = function (id, quantity) {
                var product = this.products.find(function (p) { return p.id === id; });
                if (product) { product.quantity = quantity; }
            };
            ProductStore.prototype.removeProduct = function (id) {
                var index = this.products.findIndex(function (p) { return p.id === id; });
                if (index !== -1) { this.products.splice(index, 1); }
            };
            return ProductStore;
        }());

        var User = (function () {
            function User(name, age) {
                this._name = name;
                this._age = age;
            }
            Object.defineProperty(User.prototype, "name", {
                get: function () { return this._name; },
                set: function (newName) {
                    if (newName.length > 0) { this._name = newName; }
                },
                enumerable: false,
                configurable: true
            });
            return User;
        }());

        document.addEventListener('DOMContentLoaded', function() {
            var store = new ProductStore();
            var currentUser = new User("Ерасыл", 25);
            var role = UserRole.Admin;

            var userDisplay = document.getElementById('user-display');
            var productList = document.getElementById('product-list');

            function renderUser() {
                userDisplay.innerHTML = `
                    <div class="badge">
                        <strong>${currentUser.name}</strong>, ${currentUser._age} лет<br>
                        <span>Роль: ${UserRole[role]}</span>
                    </div>
                `;
            }

            function renderProducts() {
                productList.innerHTML = store.products.map(p => `
                    <tr>
                        <td>${p.id}</td>
                        <td>${p.name}</td>
                        <td>${p.price} ₸</td>
                        <td>
                            <input type="number" value="${p.quantity}" 
                                onchange="updateQty(${p.id}, this.value)">
                        </td>
                        <td>
                            <button class="btn-del" onclick="removeProd(${p.id})">Удалить</button>
                        </td>
                    </tr>
                `).join('');
            }

            window.updateQty = function(id, val) {
                store.updateProductQuantity(id, parseInt(val));
                renderProducts();
            };

            window.removeProd = function(id) {
                store.removeProduct(id);
                renderProducts();
            };

            document.getElementById('addProdBtn').onclick = function() {
                var name = document.getElementById('pName').value;
                var price = document.getElementById('pPrice').value;
                var qty = document.getElementById('pQty').value;
                if(name) {
                    store.addProduct({
                        id: Math.floor(Math.random() * 1000),
                        name: name,
                        price: Number(price),
                        quantity: Number(qty)
                    });
                    renderProducts();
                }
            };

            document.getElementById('updateUserBtn').onclick = function() {
                var nameInput = document.getElementById('newName');
                currentUser.name = nameInput.value;
                nameInput.value = '';
                renderUser();
            };

            renderUser();
            store.addProduct({id: 1, name: "Ноутбук", price: 450000, quantity: 5});
            renderProducts();
        });
    </script>
</body>
</html>
